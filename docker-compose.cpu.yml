# ==============================================================================
# Docker Compose — CPU-only mode
#
# Use this when you don't have an NVIDIA GPU available.
# Note: Inference will be significantly slower on CPU.
#
# Usage:
#   docker compose -f docker-compose.cpu.yml up --build
#   docker compose -f docker-compose.cpu.yml up -d          # detached
#   docker compose -f docker-compose.cpu.yml down            # stop
#
# Access: http://localhost:7860
# ==============================================================================

services:
  # ---------- Gradio Demo UI ----------
  omnivoice-demo:
    container_name: omnivoice-cpu-demo
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEVICE: cpu
    ports:
      - "7860:7860"
    volumes:
      - omnivoice_models:/app/models_cache
      # Optional: mount local audio files for reference
      # - ./audio:/app/audio:ro
    environment:
      # Uncomment if you have trouble connecting to HuggingFace
      # - HF_ENDPOINT=https://hf-mirror.com
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    deploy:
      resources:
        limits:
          memory: 16G
    restart: unless-stopped
    command: ["omnivoice-demo", "--ip", "0.0.0.0", "--port", "7860"]
    profiles:
      - demo
      - all

  # ---------- REST API with Swagger ----------
  omnivoice-api:
    container_name: omnivoice-cpu-api
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEVICE: cpu
    ports:
      - "8000:8000"
    volumes:
      - omnivoice_models:/app/models_cache
    environment:
      # Uncomment if you have trouble connecting to HuggingFace
      # - HF_ENDPOINT=https://hf-mirror.com
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    deploy:
      resources:
        limits:
          memory: 16G
    restart: unless-stopped
    command: ["omnivoice-api", "--host", "0.0.0.0", "--port", "8000"]
    profiles:
      - api
      - all

volumes:
  omnivoice_models:
    name: omnivoice_models_cache
